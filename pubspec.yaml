name: faceseek
description: Reverse face image search app — 100-day build in public project.
publish_to: 'none'
version: 0.0.1+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI
  cupertino_icons: ^1.0.6
  google_fonts: ^6.1.0

  # Camera & Image
  image_picker: ^1.0.7
  camera: ^0.10.5+9

  # Face Detection (on-device)
  google_mlkit_face_detection: ^0.9.0

  # Image processing
  image: ^4.1.7

  # HTTP
  dio: ^5.4.3+1
  flutter_dotenv: ^5.1.0

  # State Management
  flutter_riverpod: ^2.5.1

  # Local Storage
  hive_flutter: ^1.1.0

  # Utils
  path_provider: ^2.1.3
  permission_handler: ^11.3.1
  share_plus: ^9.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  hive_generator: ^2.0.1
  build_runner: ^2.4.9

flutter:
  uses-material-design: true
  assets:
    - assets/images/
  fonts:
    - family: Inter
      fonts:
        - asset: assets/fonts/Inter-Regular.ttf
        - asset: assets/fonts/Inter-Medium.ttf
          weight: 500
        - asset: assets/fonts/Inter-Bold.ttf
          weight: 700
